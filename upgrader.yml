- pipeline: "Install Feature"
  on: "SCHEDULE"
  refs:
    - ":default"
  priority: "NORMAL"
  fail_on_prepare_env_warning: true
  auto_clear_cache: true
  actions:
    - action: "Generate variables from integration"
      type: "INTEGRATION_VARIABLES"
      trigger_conditions:
        - trigger_condition: "VAR_IS_NOT"
          trigger_variable_value: "PRIV"
          trigger_variable_key: "BUDDY_SCM_PROVIDER"
      integration_from: "PROJECT"
    - action: "Run Upgrader"
      type: "NATIVE_BUILD_DOCKER_CLI"
      working_directory: "/home/ubuntu/build"
      commands:
        - ""
        - "SOURCE_CODE_PROVIDER=\"${BUDDY_SCM_PROVIDER,,}\""
        - "COMPOSER_GLOBAL_CMD=\"\""
        - "SOURCE_CODE_PROVIDER_URL=\"\""
        - ""
        - "case $SOURCE_CODE_PROVIDER in"
        - "  github)"
        - "    ACCESS_TOKEN=\"$GITHUB_TOKEN\""
        - "    REPO_URL_ENDING=\".git\""
        - "    COMPOSER_GLOBAL_CMD=\"composer global config -g github-oauth.github.com ${ACCESS_TOKEN}\""
        - "    "
        - "    IFS='/' read -r -a array <<< $BUDDY_REPO_SLUG"
        - "    ORGANIZATION_NAME=\"${array[0]}\""
        - "    REPOSITORY_NAME=\"${array[1]}\""
        - "    PROJECT_NAME=\"\""
        - "    ;;"
        - ""
        - "  gitlab)"
        - "    ACCESS_TOKEN=\"$GITLAB_TOKEN\""
        - "    REPO_URL_ENDING=\".git\""
        - "    COMPOSER_GLOBAL_CMD=\"composer global config -g gitlab-token.gitlab.com ${ACCESS_TOKEN}\""
        - "    "
        - "    IFS='/' read -r -a array <<< $BUDDY_SCM_URL"
        - "    SOURCE_CODE_PROVIDER_URL=\"${array[0]}//${array[2]}\""
        - "    "
        - "    IFS='/' read -r -a array <<< $BUDDY_REPO_SLUG"
        - "    ORGANIZATION_NAME=\"${array[0]}\""
        - "    REPOSITORY_NAME=\"${array[1]}\""
        - "    PROJECT_NAME=\"\""
        - "    ;;"
        - ""
        - "  priv) # Azure can be connected through private server"
        - "    # Access token for Azure should be specified through variable"
        - "    if [ -z \"$ACCESS_TOKEN\" ]; then"
        - "        echo \"\\$ACCESS_TOKEN variable is not set. Please set it first using 'Change Upgrader config' pipeline tab.\""
        - "        exit 1"
        - "    fi"
        - ""
        - "    IFS='/' read -r -a array <<< $BUDDY_SCM_URL"
        - "    if [ \"${array[2]}\" == \"dev.azure.com\" ]; then"
        - "        SOURCE_CODE_PROVIDER=\"azure\""
        - "        REPO_URL_ENDING=\"\""
        - "    "
        - "        ORGANIZATION_NAME=\"${array[3]}\""
        - "        PROJECT_NAME=\"${array[4]}\""
        - "        REPOSITORY_NAME=\"${array[6]}\""
        - "    else"
        - "        SOURCE_CODE_PROVIDER=\"\""
        - "    fi"
        - "    ;;"
        - ""
        - "  *)"
        - "    echo \"Unsupported source code provider is used. Only GitHub, GitLab and Azure Repos are supported at the moment.\""
        - "    exit 1"
        - "    ;;"
        - "esac"
        - ""
        - "if [ -z \"$SOURCE_CODE_PROVIDER\" ]; then"
        - "    echo \"Unsupported source code provider is used. Only GitHub, GitLab and Azure Repos are supported at the moment.\""
        - "    exit 1"
        - "fi"
        - ""
        - "PHP_VERSION=$(grep -m1 -E -i '\"php\":\\s*(.*),?$' ./composer.json) "
        - "PHP_VERSION=$(echo \"$PHP_VERSION\" | awk -F ':' '{print $2}') "
        - "PHP_VERSION=$(echo \"$PHP_VERSION\" | sed -e 's/ *\"[>=^]*//' | sed 's/\",*$//') "
        - ""
        - "if [[ \"$PHP_VERSION\" == \"8.*\" ]] "
        - "then "
        - "    PHP_VERSION=\"8.1\" "
        - "fi "
        - ""
        - "if [[ \"$PHP_VERSION\" != \"8.0\" && \"$PHP_VERSION\" != \"8.1\" && \"$PHP_VERSION\" != \"8.2\" ]] "
        - "then "
        - "    echo \"Unsupported PHP version ${PHP_VERSION} is used on the project.\" "
        - "    exit 1 "
        - "fi "
        - ""
        - "docker pull spryker/php-sdk:sprykerci-${PHP_VERSION}"
        - "git remote set-url origin https://${ORGANIZATION_NAME}:${ACCESS_TOKEN}@${BUDDY_SCM_URL:8}${REPO_URL_ENDING}"
        - "docker run -u spryker --rm -v $PWD:/data/project \\"
        - "-e ACCESS_TOKEN=${ACCESS_TOKEN} \\"
        - "-e ORGANIZATION_NAME=${ORGANIZATION_NAME} \\"
        - "-e REPOSITORY_NAME=${REPOSITORY_NAME} \\"
        - "-e SOURCE_CODE_PROVIDER=${SOURCE_CODE_PROVIDER} \\"
        - "-e SOURCE_CODE_PROVIDER_URL=\"${SOURCE_CODE_PROVIDER_URL}\" \\"
        - "-e COMPOSER_GLOBAL_CMD=\"${COMPOSER_GLOBAL_CMD}\" \\"
        - "-e PROJECT_NAME=\"${PROJECT_NAME}\" \\"
        - "-e TELEMETRY_ENABLED=${REPORTING_ENABLED} \\"
        - "-e UPGRADE_STRATEGY=\"${UPGRADER_STRATEGY}\" \\"
        - "-e RELEASE_GROUP_PROCESSOR=\"${RELEASE_GROUP_PROCESSOR}\" \\"
        - "-e SOFT_THRESHOLD_MAJOR=${MAX_ALLOWED_MAJOR_VERSIONS} \\"
        - "-e SOFT_THRESHOLD_MINOR=${MAX_ALLOWED_MINOR_VERSIONS} \\"
        - "-e SOFT_THRESHOLD_PATCH=${MAX_ALLOWED_PATCH_VERSIONS} \\"
        - "-e INTEGRATOR_ENABLED=${INTEGRATOR_ENABLED} \\"
        - "-e MANIFESTS_RATING_THRESHOLD=${MIN_ALLOWED_MANIFEST_RATING} \\"
        - "-e EVALUATOR_ENABLED=${EVALUATOR_ENABLED} \\"
        - "-e PACKAGE_UPGRADE_ONLY=${PACKAGE_UPGRADE_ONLY} \\"
        - "-e REPORTING_ENABLED=${REPORTING_ENABLED} \\"
        - "-e REPORT_SEND_AUTH_TOKEN=\"${ATHENA_AUTH_TOKEN}\" \\"
        - "-e NEWRELIC_ENABLED=${NEWRELIC_ENABLED} \\"
        - "-e NEWRELIC_LICENSE=\"${NEWRELIC_LICENSE}\" \\"
        - "-e NEWRELIC_APPNAME=\"${NEWRELIC_APPNAME}\" \\"
        - "-e NEWRELIC_LOGLEVEL=\"${NEWRELIC_LOGLEVEL}\" \\"
        - "-e UPDATE_MINIMUM_DEPENDENCIES_ENABLED=${UPDATE_MINIMUM_DEPENDENCIES_ENABLED} \\"
        - "-e RELEASE_GROUP_ID=\"${RELEASE_GROUP_ID}\" \\"
        - "-e CI_WORKSPACE_NAME=\"${BUDDY_WORKSPACE_NAME}\" \\"
        - "-e CI_EXECUTION_ID=\"${BUDDY_EXECUTION_URL}\" \\"
        - "-e APP_ENV=${APP_ENV} \\"
        - "spryker/php-sdk:sprykerci-${PHP_VERSION} 'git config --global user.email upgrader@spryker.com "
        - "&& git config --global user.name \"upgrader\" "
        - "&& $COMPOSER_GLOBAL_CMD "
        - "&& cd /data/project "
        - "&& echo \"*** PHP version:\" "
        - "&& composer --version "
        - "&& echo \"*** Composer version:\" "
        - "&& composer --version "
        - "&& echo \"*** Install composer...\" "
        - "&& composer install --no-scripts --no-plugins --ignore-platform-reqs -vvv "
        - "&& echo \"*** Install feature...\" "
        - "&& composer require ${INSTALL_FEATURE} --no-scripts --no-plugins --ignore-platform-reqs -vvv "
        - "&& echo \"*** Delete local upgrader branches...\" "
        - "&& ((git branch -D `git branch | grep -E \"upgradebot\\/\"` > /dev/null 2>&1) || true) "
        - "&& echo \"*** Git status:\" "
        - "&& git status "
        - "&& echo \"*** Start upgrader... \" "
        - "&& /data/bin/console upgradability:php:upgrade -vvv'"
      shell: "BASH"
      variables:
        - key: "NEWRELIC_LOGLEVEL"
          value: "!NEWRELIC_LOGLEVEL"
          type: "VAR"
        - key: "NEWRELIC_APPNAME"
          value: "!NEWRELIC_APPNAME"
          type: "VAR"
          encrypted: true
        - key: "APP_ENV"
          value: "!APP_ENV"
          type: "VAR"
        - key: "NEWRELIC_ENABLED"
          value: "!NEWRELIC_ENABLED"
          type: "VAR"
        - key: "EVALUATOR_ENABLED"
          value: "!EVALUATOR_ENABLED"
          type: "VAR"
        - key: "INTEGRATOR_ENABLED"
          value: "!INTEGRATOR_ENABLED"
          type: "VAR"
        - key: "PACKAGE_UPGRADE_ONLY"
          value: "!PACKAGE_UPGRADE_ONLY"
          type: "VAR"
        - key: "REPORTING_ENABLED"
          value: "!REPORTING_ENABLED"
          type: "VAR"
        - key: "UPGRADER_STRATEGY"
          value: "!UPGRADER_STRATEGY"
          type: "VAR"
        - key: "RELEASE_GROUP_PROCESSOR"
          value: "!RELEASE_GROUP_PROCESSOR"
          type: "VAR"
        - key: "MAX_ALLOWED_MAJOR_VERSIONS"
          value: "!MAX_ALLOWED_MAJOR_VERSIONS"
          type: "VAR"
        - key: "MIN_ALLOWED_MANIFEST_RATING"
          value: "!MIN_ALLOWED_MANIFEST_RATING"
          type: "VAR"
        - key: "UPDATE_MINIMUM_DEPENDENCIES_ENABLED"
          value: "!UPDATE_MINIMUM_DEPENDENCIES_ENABLED"
          type: "VAR"
      sync_paths:
        - pipeline_path: "/"
          vm_path: "/home/ubuntu/build"
          direction: "PIPELINE_TO_VM"
          excludes: ""
        - pipeline_path: "/"
          vm_path: "/home/ubuntu/build"
          direction: "VM_TO_PIPELINE"
          excludes: ""
      docker_layer_caching: false
      docker_layer_caching_scope: "ACTION"
