- pipeline: "Upgrader"
  on: "SCHEDULE"
  refs:
    - ":default"
  priority: "NORMAL"
  fail_on_prepare_env_warning: true
  auto_clear_cache: true
  actions:
    - action: "Generate variables from integration"
      type: "INTEGRATION_VARIABLES"
      trigger_conditions:
        - trigger_condition: "VAR_IS_NOT"
          trigger_variable_value: "PRIV"
          trigger_variable_key: "BUDDY_SCM_PROVIDER"
      integration_from: "PROJECT"
    - action: "Get Features"
      type: "NATIVE_BUILD_DOCKER_CLI"
      working_directory: "/home/ubuntu/build"
      commands:
        - ""
        - "export INSTALL_FEATURES=\"spryker-feature/wishlist\ spryker-feature/configurable-product-wishlist\ spryker-feature/gift-cards\""
      shell: "BASH"
      docker_layer_caching: false
      docker_layer_caching_scope: "ACTION"
    - action: "Pass Arguments"
      type: "WAIT_FOR_VARIABLES"
      variables:
        - key: "INSTALL_FEATURES"
          type: "VAR"
        - key: "SPRYKER-FEATURE--WISHLIST"
          type: "VAR"
          defaults: "true\nfalse"
    - action: "Install Features"
      type: "NATIVE_BUILD_DOCKER_CLI"
      working_directory: "/home/ubuntu/build"
      commands:
        - ""
        - "echo \"${INSTALL_FEATURES}\" "
        - "composer require \"${INSTALL_FEATURES}\" --no-scripts --no-plugins --ignore-platform-reqs -vvv "
      sync_paths:
        - pipeline_path: "/"
          vm_path: "/home/ubuntu/build"
          direction: "PIPELINE_TO_VM"
          excludes: ""
        - pipeline_path: "/"
          vm_path: "/home/ubuntu/build"
          direction: "VM_TO_PIPELINE"
          excludes: ""
      shell: "BASH"
      docker_layer_caching: false
      docker_layer_caching_scope: "ACTION"
